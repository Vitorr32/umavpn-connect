name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and publish (e.g. v1.6)
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing KEYSTORE_BASE64 repository secret"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > uma-vpn-android/keystore.jks
          printf '%s\n' \
            "storeFile=keystore.jks" \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${KEY_PASSWORD}" \
            > uma-vpn-android/keystore.properties

      - name: Build release APK
        run: |
          cd uma-vpn-android
          ./gradlew assembleRelease

      - name: Package APK
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          cp uma-vpn-android/app/build/outputs/apk/release/app-release.apk "UmaVPN-v${VERSION}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: UmaVPN-v*.apk
          generate_release_notes: false
          overwrite_files: true
